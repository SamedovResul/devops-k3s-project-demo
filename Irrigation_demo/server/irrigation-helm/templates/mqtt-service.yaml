apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mqtt
spec:
  selector:
    app: {{ .Release.Name }}-mqtt
  ports:
    - name: mqtt
      port: {{ .Values.mqtt.ports.mqtt }}
      targetPort: {{ .Values.mqtt.ports.mqtt }}
    - name: websocket
      port: {{ .Values.mqtt.ports.websocket }}
      targetPort: {{ .Values.mqtt.ports.websocket }}
